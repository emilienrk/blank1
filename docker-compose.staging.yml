# Override staging :
#   docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
# Le .env staging définit : APP_ENV=staging, SITE_ADDRESS=staging.<domaine>,
# API_IMAGE/WEB_IMAGE (tags GHCR), POSTGRES_PASSWORD.

services:
  postgres:
    restart: unless-stopped

  valkey:
    restart: unless-stopped

  api:
    restart: unless-stopped
    pull_policy: always

  worker:
    restart: unless-stopped
    pull_policy: always

  caddy:
    restart: unless-stopped
    pull_policy: always
    ports:
      - "80:80"
      - "443:443"
