# Environnement complet : `docker compose up -d`.
# Dev partiel : `make infra` (Postgres, Valkey) puis `make api` et `make web`
# en local pour le rechargement à chaud.
# Staging : combiné avec docker-compose.staging.yml.

services:
  postgres:
    image: postgres:17
    environment:
      # Ce rôle peut CREATE DATABASE : requis par le provisioning de tenants (Phase 1).
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-controlplane}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-controlplane}"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - valkey_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: ${API_IMAGE:-saas-api:local}
    environment: &app_env
      APP_ENV: ${APP_ENV:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      VALKEY_URL: redis://valkey:6379/0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-controlplane}
      GDPR_EXPORT_DIR: /var/lib/saas/gdpr-exports
    volumes:
      # Exports RGPD chiffrés (Phase 4 T4) : volume dédié, hors image, TTL applicatif.
      - gdpr_exports:/var/lib/saas/gdpr-exports
    depends_on:
      valkey:
        condition: service_started
      postgres:
        condition: service_healthy

  # Même image que l'api : seule la commande diffère (invariant du plan global).
  worker:
    image: ${API_IMAGE:-saas-api:local}
    command: ["celery", "-A", "app.worker.celery_app", "worker", "--loglevel=INFO"]
    environment: *app_env
    volumes:
      # Le worker exécute pg_dump/purge : même volume que l'api (Phase 4 T4).
      - gdpr_exports:/var/lib/saas/gdpr-exports
    depends_on:
      valkey:
        condition: service_started
      postgres:
        condition: service_healthy

  # Même image encore : le scheduler des tâches périodiques (purge auth Phase 2,
  # rétention/effacements/purge exports RGPD Phase 4 — `app.worker.celery_app.beat_schedule`).
  # Processus séparé du worker (recommandation Celery : jamais beat+worker en un seul process).
  beat:
    image: ${API_IMAGE:-saas-api:local}
    command: ["celery", "-A", "app.worker.celery_app", "beat", "--loglevel=INFO"]
    environment: *app_env
    depends_on:
      valkey:
        condition: service_started
      postgres:
        condition: service_healthy

  # Sert la SPA buildée et route /api/* vers l'api (TLS auto en staging).
  caddy:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: ${WEB_IMAGE:-saas-web:local}
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-http://localhost:8080}
    ports:
      - "8080:8080"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  postgres_data:
  valkey_data:
  caddy_data:
  caddy_config:
  gdpr_exports:
