# Publication des images staging vers GHCR à chaque push sur main.
# Le déploiement est fait PAR la machine de staging elle-même (modèle pull) :
# un timer systemd exécute scripts/deploy-pull.sh qui détecte les nouvelles
# images :latest et redéploie. Aucun runner ni accès entrant sur la machine.
name: Staging images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    name: Build et push vers GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Image api+worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-api:${{ github.sha }}
            ghcr.io/${{ github.repository }}-api:latest
      - name: Image web (SPA + Caddy)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-web:${{ github.sha }}
            ghcr.io/${{ github.repository }}-web:latest
      - name: Image admin (back-office SPA + Caddy, jamais exposée publiquement)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-admin:${{ github.sha }}
            ghcr.io/${{ github.repository }}-admin:latest
