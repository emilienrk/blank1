# Déploiement continu vers staging (plan Phase 0, T9) :
# build + push des images vers GHCR, puis déploiement par le runner
# self-hosted installé sur la machine de staging (aucune exposition SSH entrante).
#
# Prérequis manuels sur la machine de staging (documentés dans le README) :
#   - runner GitHub enregistré avec les labels [self-hosted, staging]
#   - fichier /srv/saas/.env (APP_ENV=staging, SITE_ADDRESS, mots de passe)
name: Deploy staging

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  API_IMAGE: ghcr.io/${{ github.repository }}-api:${{ github.sha }}
  WEB_IMAGE: ghcr.io/${{ github.repository }}-web:${{ github.sha }}

jobs:
  build-push:
    name: Build et push vers GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Image api+worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}
            ghcr.io/${{ github.repository }}-api:latest
      - name: Image web (SPA + Caddy)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}
            ghcr.io/${{ github.repository }}-web:latest

  deploy:
    name: Déploiement sur la machine staging
    needs: build-push
    runs-on: [self-hosted, staging]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull et redémarrage des services
        run: |
          docker compose --env-file /srv/saas/.env \
            -f docker-compose.yml -f docker-compose.staging.yml pull
          docker compose --env-file /srv/saas/.env \
            -f docker-compose.yml -f docker-compose.staging.yml up -d --remove-orphans
      - name: Smoke test (health via Caddy, TLS)
        run: |
          SITE=$(grep '^SITE_ADDRESS=' /srv/saas/.env | cut -d= -f2)
          ./scripts/smoke.sh "https://${SITE}"
