# CI bloquante (invariant I5) : lint + types + tests back et front,
# dérive du client TS généré, build des images Docker.
name: CI

on:
  push:
  workflow_dispatch:

jobs:
  backend:
    name: Backend (ruff, pyright, pytest)
    runs-on: ubuntu-latest
    # Les tests DB exigent un vrai Postgres (décision D6 Phase 1) ; les valeurs
    # correspondent aux défauts de Settings (localhost/app/change-me/controlplane).
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: change-me
          POSTGRES_DB: controlplane
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U app -d controlplane"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.17"
      - run: uv sync --all-packages
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pyright
      - run: uv run pytest

  frontend:
    name: Frontend (eslint, tsc, vitest, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web lint
      - run: pnpm --filter web typecheck
      - run: pnpm --filter @app/api-client typecheck
      - run: pnpm --filter @app/ui typecheck
      - run: pnpm --filter web test
      - run: pnpm --filter web build

  contract:
    name: Dérive du client TS (OpenAPI = source de vérité)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.17"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: uv sync --all-packages
      - run: pnpm install --frozen-lockfile
      - run: make generate-client
      - name: Le client committé doit être identique au client régénéré
        run: git diff --exit-code -- packages/api-client

  docker:
    name: Build des images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Image api+worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
      - name: Image web (SPA + Caddy)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
